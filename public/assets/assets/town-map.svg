<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grass" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0%" stop-color="#c3d59a"/><stop offset="45%" stop-color="#a4be7b"/><stop offset="100%" stop-color="#7f9c63"/>
    </linearGradient>
    <radialGradient id="sun" cx="34%" cy="20%" r="85%">
      <stop offset="0%" stop-color="#fff4d8" stop-opacity="0.55"/><stop offset="45%" stop-color="#fbe9c0" stop-opacity="0.12"/><stop offset="100%" stop-color="#fbe9c0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="river" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a9d0d2"/><stop offset="100%" stop-color="#6fa6ac"/>
    </linearGradient>
    <linearGradient id="roofA" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#b6663f"/><stop offset="100%" stop-color="#8f4a2c"/></linearGradient>
    <linearGradient id="roofB" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7d5a3a"/><stop offset="100%" stop-color="#5d4128"/></linearGradient>
    <linearGradient id="roofG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d8b25a"/><stop offset="100%" stop-color="#b08636"/></linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#3a2c14" flood-opacity="0.30"/></filter>
    <pattern id="field" width="30" height="30" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <path d="M0 7 H30 M0 15 H30 M0 23 H30" stroke="#8a9a4c" stroke-width="4" opacity="0.6"/>
    </pattern>
    <pattern id="plots" width="150" height="86" patternUnits="userSpaceOnUse" patternTransform="translate(800 300) rotate(0)">
      <path d="M75 0 L150 43 L75 86 L0 43 Z" fill="none" stroke="rgba(255,255,255,0.20)" stroke-width="2"/>
    </pattern>
  </defs>

  <!-- ground -->
  <rect width="1600" height="900" fill="url(#grass)"/>
  <g transform="translate(800 470)">
    <polygon points="0,-300 720,120 0,540 -720,120" fill="#9fb877" opacity="0.55"/>
    <polygon points="0,-300 720,120 0,540 -720,120" fill="url(#plots)" opacity="0.5"/>
  </g>

  <!-- river -->
  <path d="M1230 -20 C1180 130 1250 230 1150 360 C1070 470 1180 560 1090 690 C1030 780 980 840 930 900 L1600 900 L1600 -20 Z" fill="url(#river)" opacity="0.85"/>
  <path d="M1230 -20 C1180 130 1250 230 1150 360 C1070 470 1180 560 1090 690 C1030 780 980 840 930 900" fill="none" stroke="#e8f2ec" stroke-width="4" opacity="0.4"/>

  <!-- roads -->
  <path d="M120 700 C300 610 430 615 580 535 C760 440 880 455 1030 360 C1150 285 1280 250 1470 220" fill="none" stroke="#cdb488" stroke-width="40" opacity="0.9" stroke-linecap="round"/>
  <path d="M270 175 C400 305 520 415 675 505 C855 605 1030 685 1290 760" fill="none" stroke="#cdb488" stroke-width="30" opacity="0.82" stroke-linecap="round"/>
  <path d="M120 700 C300 610 430 615 580 535 C760 440 880 455 1030 360 C1150 285 1280 250 1470 220" fill="none" stroke="#a98d63" stroke-width="4" opacity="0.5"/>

  <!-- fields -->
  <g stroke="#e7dcb8" stroke-width="4">
    <polygon points="95,515 320,450 425,610 190,690" fill="url(#field)"/>
    <polygon points="255,290 470,240 560,378 348,432" fill="url(#field)"/>
    <polygon points="1030,520 1240,470 1330,600 1110,668" fill="url(#field)"/>
    <polygon points="470,650 690,600 770,730 545,790" fill="url(#field)"/>
  </g>

  <!-- fences -->
  <g stroke="#b79a6b" stroke-width="3" opacity="0.7" fill="none">
    <path d="M600 470 L780 415 M780 415 L830 505 M830 505 L650 560 M650 560 L600 470"/>
    <path d="M860 560 L1000 520 M1000 520 L1050 600 M1050 600 L910 640 M910 640 L860 560"/>
  </g>

  <!-- trees clusters -->
  <g>
    <g fill="#3f6a44"><circle cx="105" cy="120" r="40"/><circle cx="155" cy="98" r="34"/><circle cx="205" cy="140" r="42"/></g>
    <g fill="#457049"><circle cx="118" cy="110" r="20" opacity="0.6"/><circle cx="196" cy="132" r="22" opacity="0.6"/></g>
    <g fill="#3f6a44"><circle cx="1355" cy="150" r="46"/><circle cx="1420" cy="112" r="40"/><circle cx="1460" cy="182" r="44"/></g>
    <g fill="#3f6a44"><circle cx="1360" cy="800" r="44"/><circle cx="1440" cy="748" r="52"/><circle cx="1510" cy="820" r="42"/></g>
    <g fill="#456f4a"><circle cx="360" cy="760" r="30"/><circle cx="410" cy="742" r="26"/></g>
  </g>

  <!-- central plaza glow -->
  <ellipse cx="800" cy="470" rx="230" ry="120" fill="#d8bd88" opacity="0.30"/>
  <ellipse cx="800" cy="470" rx="150" ry="78" fill="#ecd8a6" opacity="0.4"/>

  <!-- BUILDINGS -->
  <g filter="url(#soft)">
    <!-- church / shrine -->
    <g transform="translate(415 190)">
      <polygon points="0,95 120,45 240,95 120,150" fill="#c2a878" stroke="#6f5738" stroke-width="4"/>
      <rect x="82" y="66" width="78" height="74" fill="#f6efdc" stroke="#6f5738" stroke-width="4"/>
      <polygon points="76,66 121,34 166,66" fill="url(#roofB)"/>
      <polygon points="112,20 130,20 130,-46 112,-46" fill="#6b5238"/>
      <polygon points="94,-46 148,-46 121,-96" fill="#d6a13c"/>
      <rect x="110" y="102" width="22" height="38" fill="#5b4630"/>
    </g>

    <!-- dwellings cluster -->
    <g transform="translate(700 300)">
      <g><polygon points="0,72 72,32 144,72 72,110" fill="#cbaa78" stroke="#6f5737" stroke-width="3"/><rect x="30" y="58" width="84" height="56" fill="#efe3c8" stroke="#6f5737" stroke-width="3"/><polygon points="24,58 72,22 120,58" fill="url(#roofA)"/></g>
      <g transform="translate(124 46)"><polygon points="0,72 72,32 144,72 72,110" fill="#cbaa78" stroke="#6f5737" stroke-width="3"/><rect x="30" y="58" width="84" height="56" fill="#efe3c8" stroke="#6f5737" stroke-width="3"/><polygon points="24,58 72,22 120,58" fill="url(#roofB)"/></g>
      <g transform="translate(-96 66)"><polygon points="0,72 72,32 144,72 72,110" fill="#cbaa78" stroke="#6f5737" stroke-width="3"/><rect x="30" y="58" width="84" height="56" fill="#efe3c8" stroke="#6f5737" stroke-width="3"/><polygon points="24,58 72,22 120,58" fill="url(#roofA)"/></g>
      <g transform="translate(40 128)"><polygon points="0,66 64,30 128,66 64,102" fill="#cbaa78" stroke="#6f5737" stroke-width="3"/><rect x="26" y="54" width="76" height="50" fill="#efe3c8" stroke="#6f5737" stroke-width="3"/><polygon points="20,54 64,22 108,54" fill="url(#roofB)"/></g>
    </g>

    <!-- workshop with chimney + smoke -->
    <g transform="translate(1120 450)">
      <polygon points="0,78 96,26 192,78 96,130" fill="#ac7c4c" stroke="#4f3925" stroke-width="4"/>
      <rect x="36" y="62" width="120" height="78" fill="#d9c29d" stroke="#4f3925" stroke-width="4"/>
      <polygon points="26,62 96,16 166,62" fill="url(#roofA)"/>
      <rect x="140" y="26" width="22" height="58" fill="#4e3728"/>
      <path d="M162 22 C196 -20 224 -6 206 26 C198 40 214 44 208 60" fill="none" stroke="#efe7d8" stroke-width="12" opacity="0.7"/>
      <rect x="74" y="94" width="38" height="46" fill="#49321f"/>
      <rect x="46" y="86" width="20" height="24" fill="#f2c14e" opacity="0.85"/>
    </g>

    <!-- granary -->
    <g transform="translate(885 615)">
      <polygon points="0,72 88,24 176,72 88,120" fill="#c39a50" stroke="#674c25" stroke-width="4"/>
      <rect x="30" y="62" width="116" height="66" fill="url(#roofG)" stroke="#674c25" stroke-width="4"/>
      <polygon points="22,60 88,16 154,60" fill="#7d5a30"/>
      <path d="M50 78 H126 M50 96 H126 M50 114 H126" stroke="#6c4f27" stroke-width="4" opacity="0.65"/>
    </g>

    <!-- market with red awning -->
    <g transform="translate(545 575)">
      <polygon points="0,64 82,22 164,64 82,105" fill="#d2a94f" stroke="#715329" stroke-width="4"/>
      <rect x="22" y="56" width="120" height="66" fill="#f1e5c1" stroke="#715329" stroke-width="4"/>
      <path d="M18 56 H146" stroke="#b64d3d" stroke-width="12"/>
      <path d="M18 56 l16 -16 h96 l16 16" fill="#c85a48" opacity="0.9"/>
    </g>

    <!-- town gate -->
    <g transform="translate(220 555)">
      <rect x="0" y="40" width="44" height="94" fill="#8f7047" stroke="#4d3b25" stroke-width="4"/>
      <rect x="122" y="40" width="44" height="94" fill="#8f7047" stroke="#4d3b25" stroke-width="4"/>
      <path d="M14 40 L83 -2 L152 40" fill="#5f4631" stroke="#4d3b25" stroke-width="4"/>
      <rect x="57" y="70" width="52" height="64" fill="#3c2b1e"/>
    </g>
  </g>

  <!-- tiny villagers -->
  <g opacity="0.9">
    <circle cx="745" cy="512" r="7" fill="#33472f"/><circle cx="798" cy="536" r="6" fill="#4c3426"/>
    <circle cx="862" cy="506" r="6" fill="#33472f"/><circle cx="666" cy="562" r="6" fill="#4c3426"/>
    <circle cx="992" cy="546" r="6" fill="#33472f"/><circle cx="612" cy="612" r="6" fill="#4c3426"/>
  </g>

  <!-- warm light + soft vignette -->
  <rect width="1600" height="900" fill="url(#sun)"/>
  <rect width="1600" height="900" fill="rgba(28,20,8,0.05)"/>
</svg>
